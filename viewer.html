<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DGS 场景查看器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: -apple-system, 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #888; font-size: 14px; z-index: 10; pointer-events: none;
  }
  #hud {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    padding: 8px 16px; color: rgba(255,255,255,0.5); font-size: 11px;
    text-align: center; user-select: none; z-index: 10;
  }
  #toolbar {
    position: fixed; top: 14px; right: 16px; display: flex; gap: 6px; z-index: 10;
  }
  #toolbar button {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; color: rgba(255,255,255,0.5); padding: 5px 10px;
    font-size: 11px; cursor: pointer;
  }
  #toolbar button:hover { background: rgba(255,255,255,0.1); color: #fff; }
</style>
</head>
<body>

<div id="status">加载中...</div>
<div id="hud">鼠标拖拽旋转 · 滚轮缩放 · 右键平移 · 双击重置</div>
<div id="toolbar">
  <button id="btnReset">重置视角</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "/static/node_modules/three/build/three.module.js",
    "three/addons/": "/static/node_modules/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const statusEl = document.getElementById('status');

// ─── 场景初始化 ────────────────────────────────────────────────
const canvas = document.createElement('canvas');
document.body.prepend(canvas);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x111111);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.05, 500);
camera.position.set(0, 1.5, 4);

// 添加一个微弱的网格帮助感知空间
const grid = new THREE.GridHelper(10, 20, 0x333333, 0x1a1a1a);
scene.add(grid);

// ─── OrbitControls ─────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ─── Splat 渲染 ────────────────────────────────────────────────
let splatMesh = null;

function parseSplat(buffer) {
  const count = Math.floor(buffer.byteLength / 32);
  const view = new DataView(buffer);
  statusEl.textContent = `解析 ${count} 个高斯点...`;

  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 4);
  const scales = new Float32Array(count * 3);
  const quats = new Float32Array(count * 4);
  const opacities = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    const o = i * 32;
    positions[i * 3]     = view.getFloat32(o + 0, true);
    positions[i * 3 + 1] = view.getFloat32(o + 4, true);
    positions[i * 3 + 2] = view.getFloat32(o + 8, true);

    // SH DC (RGB) — 直接用 0 阶球谐系数
    colors[i * 4]     = Math.max(0, view.getUint8(o + 12) / 255);
    colors[i * 4 + 1] = Math.max(0, view.getUint8(o + 13) / 255);
    colors[i * 4 + 2] = Math.max(0, view.getUint8(o + 14) / 255);
    colors[i * 4 + 3] = view.getUint8(o + 15) / 255;

    scales[i * 3]     = Math.abs(view.getFloat32(o + 16, true));
    scales[i * 3 + 1] = Math.abs(view.getFloat32(o + 20, true));
    scales[i * 3 + 2] = Math.abs(view.getFloat32(o + 24, true));

    quats[i * 4]     = (view.getUint8(o + 28) - 128) / 128;
    quats[i * 4 + 1] = (view.getUint8(o + 29) - 128) / 128;
    quats[i * 4 + 2] = (view.getUint8(o + 30) - 128) / 128;
    quats[i * 4 + 3] = (view.getUint8(o + 31) - 128) / 128;
  }

  return { positions, colors, scales, quats, opacities, count };
}

function createSplatMesh(data) {
  if (splatMesh) {
    scene.remove(splatMesh);
    splatMesh.geometry.dispose();
    splatMesh.material.dispose();
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
  geo.setAttribute('color',     new THREE.BufferAttribute(data.colors, 4));
  geo.setAttribute('scale',     new THREE.BufferAttribute(data.scales, 3));
  geo.setAttribute('quat',      new THREE.BufferAttribute(data.quats, 4));

  // compute bounding sphere
  geo.computeBoundingSphere();
  const center = geo.boundingSphere.center;
  const radius = geo.boundingSphere.radius;

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uFocal:    { value: new THREE.Vector2(1, 1) },
      uViewport: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    },
    vertexShader: /* glsl */ `
      attribute vec4 quat;
      attribute vec3 scale;
      attribute vec4 color;
      varying vec4 vColor;
      varying float vOpacity;
      varying mat2 vCov2D;
      uniform vec2 uFocal;
      uniform vec2 uViewport;

      mat3 quatToMat3(vec4 q) {
        float qx = q.x, qy = q.y, qz = q.z, qw = q.w;
        float x2 = qx + qx, y2 = qy + qy, z2 = qz + qz;
        float xx = qx * x2, yy = qy * y2, zz = qz * z2;
        float xy = qx * y2, xz = qx * z2, yz = qy * z2;
        float wx = qw * x2, wy = qw * y2, wz = qw * z2;
        return mat3(
          1.0 - (yy + zz), xy - wz,         xz + wy,
          xy + wz,         1.0 - (xx + zz), yz - wx,
          xz - wy,         yz + wx,         1.0 - (xx + yy)
        );
      }

      void main() {
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mvPos;
        gl_PointSize = 20.0; // will be clipped by fragment shader

        vColor = color;
        vOpacity = color.a;

        mat3 R = quatToMat3(quat);
        mat3 S = mat3(scale.x, 0, 0, 0, scale.y, 0, 0, 0, scale.z);
        mat3 W = mat3(modelViewMatrix);
        mat3 M = W * R * S;
        mat3 cov3D = M * transpose(M);

        float z = max(abs(mvPos.z), 0.001);
        float iz = 1.0 / z;
        float fx = uFocal.x * uViewport.x * 0.5;
        float fy = uFocal.y * uViewport.y * 0.5;

        float j00 = fx * iz;
        float j02 = -fx * mvPos.x * iz * iz;
        float j11 = fy * iz;
        float j12 = -fy * mvPos.y * iz * iz;

        float c00 = cov3D[0][0], c01 = cov3D[0][1], c02 = cov3D[0][2];
        float c11 = cov3D[1][1], c12 = cov3D[1][2], c22 = cov3D[2][2];

        vCov2D[0][0] = j00*j00*c00 + 2.0*j00*j02*c02 + j02*j02*c22 + 0.3;
        vCov2D[0][1] = j00*j11*c01 + j00*j12*c02 + j02*j11*c12 + j02*j12*c22;
        vCov2D[1][0] = vCov2D[0][1];
        vCov2D[1][1] = j11*j11*c11 + 2.0*j11*j12*c12 + j12*j12*c22 + 0.3;
      }
    `,
    fragmentShader: /* glsl */ `
      varying vec4 vColor;
      varying float vOpacity;
      varying mat2 vCov2D;

      void main() {
        vec2 pt = gl_PointCoord - 0.5;
        float a = vCov2D[0][0];
        float b = vCov2D[0][1];
        float d = vCov2D[1][1];
        float det = max(a * d - b * b, 0.0001);
        float invDet = 1.0 / det;
        float dist2 = invDet * (d * pt.x * pt.x - 2.0 * b * pt.x * pt.y + a * pt.y * pt.y);
        float alpha = exp(-0.5 * dist2) * vOpacity;
        if (alpha < 0.003) discard;
        gl_FragColor = vec4(vColor.rgb, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending,
  });

  splatMesh = new THREE.Points(geo, mat);
  splatMesh.frustumCulled = false;
  scene.add(splatMesh);

  // 更新相机位置到场景中心
  controls.target.copy(center);
  camera.position.set(center.x, center.y + Math.max(radius * 0.5, 1), center.z + radius * 2);
  controls.update();

  // 更新焦距 uniform
  const fov = camera.fov * Math.PI / 180;
  const fy = 1.0 / Math.tan(fov / 2);
  mat.uniforms.uFocal.value.set(fy, fy);

  statusEl.textContent = '';
}

function updateFocal() {
  if (!splatMesh) return;
  const fov = camera.fov * Math.PI / 180;
  const fy = 1.0 / Math.tan(fov / 2);
  splatMesh.material.uniforms.uFocal.value.set(fy, fy);
  splatMesh.material.uniforms.uViewport.value.set(
    renderer.domElement.width, renderer.domElement.height
  );
}

// ─── 加载 ──────────────────────────────────────────────────────
async function loadSplat(url) {
  try {
    statusEl.textContent = '下载模型...';
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf = await resp.arrayBuffer();
    statusEl.textContent = `文件大小: ${(buf.byteLength / 1024).toFixed(0)} KB`;
    const data = parseSplat(buf);
    createSplatMesh(data);
    grid.visible = false;
  } catch (e) {
    statusEl.textContent = '加载失败: ' + e.message;
    console.error(e);
  }
}

// ─── 渲染循环 ──────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateFocal();
  renderer.render(scene, camera);
}
animate();

// ─── 事件 ──────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  updateFocal();
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (splatMesh) {
    splatMesh.geometry.computeBoundingSphere();
    const c = splatMesh.geometry.boundingSphere.center;
    const r = splatMesh.geometry.boundingSphere.radius;
    controls.target.copy(c);
    camera.position.set(c.x, c.y + Math.max(r * 0.5, 1), c.z + r * 2);
    controls.update();
  } else {
    controls.target.set(0, 0, 0);
    camera.position.set(0, 1.5, 4);
    controls.update();
  }
});

// ─── 自动加载 URL 参数指定的文件 ────────────────────────────────
const params = new URLSearchParams(window.location.search);
const splatUrl = params.get('splat');
if (splatUrl) {
  loadSplat(splatUrl);
}
</script>
</body>
</html>
