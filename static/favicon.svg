  <path d="M44 24 Q52 22 60 24 Q68 26 76 24" stroke="#a8d8f8" stroke-width="1.5" fill="none"/>
  <path d="M46 30 Q54 28 62 30 Q70 32 74 30" stroke="#a8d8f8" stroke-width="1.5" fill="none"/>
  <!-- 蓝色水龙头 (左) -->
  <rect x="34" y="72" width="16" height="6" rx="3" fill="#4a9ff5"/>
  <rect x="38" y="78" width="8" height="10" rx="2" fill="#4a9ff5"/>
  <rect x="40" y="80" width="4" height="4" rx="1" fill="#ffffff" opacity="0.3"/>
  <!-- 蓝色水龙头 (右) -->
  <rect x="70" y="72" width="16" height="6" rx="3" fill="#4a9ff5"/>
  <rect x="74" y="78" width="8" height="10" rx="2" fill="#4a9ff5"/>
  <rect x="76" y="80" width="4" height="4" rx="1" fill="#ffffff" opacity="0.3"/>
  <!-- 出水水滴 -->
  <ellipse cx="42" cy="90" rx="3" ry="5" fill="#a8d8f8" opacity="0.8"/>
  <ellipse cx="78" cy="90" rx="3" ry="5" fill="#a8d8f8" opacity="0.8"/>
  <!-- 小水滴 -->
  <ellipse cx="36" cy="94" rx="2" ry="3" fill="#c0e4ff" opacity="0.6"/>
  <ellipse cx="84" cy="94" rx="2" ry="3" fill="#c0e4ff" opacity="0.6"/>
